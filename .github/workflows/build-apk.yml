name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Unzip project
        run: |
          unzip -o MyChrysler300C_REAL_APK_FILES.zip
          unzip -o MyChrysler300C_Android_Source.zip

      - name: Build APK
        run: |
          cd MyChrysler300C_Android_Source
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyChrysler300C-real-apk
          path: MyChrysler300C_Android_Source/app/build/outputs/apk/debug/app-debug.apk
