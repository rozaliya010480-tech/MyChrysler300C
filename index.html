    .app { max-width:720px; margin:0 auto; min-height:100vh; background:#f8fafc; }
    header { background:linear-gradient(135deg,#020617,#1e293b); color:white; padding:22px 16px 18px; border-radius:0 0 28px 28px; position:sticky; top:0; z-index:3; box-shadow:0 8px 24px rgba(0,0,0,.22); }
    h1 { margin:0; font-size:25px; }
    .sub { margin-top:6px; color:#cbd5e1; font-size:14px; line-height:1.25; }
    .wrap { padding:12px 12px 158px; }

    .value { margin-top:5px; font-size:22px; font-weight:900; }

    label { display:block; color:#475569; font-size:12px; font-weight:900; margin:10px 0 4px; }

    textarea { min-height:76px; resize:vertical; }

    .btn.red { background:#dc2626; }
    .btn.dark { background:#020617; }
    .btn.light { background:#e2e8f0; color:#0f172a; }
    .pill { display:inline-block; padding:5px 9px; border-radius:99px; font-size:12px; font-weight:900; background:#e2e8f0; color:#334155; margin-right:5px; margin-top:5px; }
    .pill.red { background:#fee2e2; color:#991b1b; }

    .pill.amber { background:#fef3c7; color:#92400e; }

    .smallBtn { border:0; border-radius:12px; padding:8px 10px; font-weight:900; background:#e2e8f0; color:#0f172a; white-space:nowrap; }

    .installBtn { display:none; border:0; border-radius:14px; padding:9px 12px; background:white; color:#020617; font-weight:900; }
    .topline { display:flex; align-items:center; justify-content:space-between; gap:12px; }

function id(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function byId(x){ return document.getElementById(x); }
function esc(v){ return String(v ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function rub(n){ return (Number(n)||0).toLocaleString("ru-RU", {maximumFractionDigits:2}) + " ₽"; }
function km(n){ return (Number(n)||0).toLocaleString("ru-RU") + " км"; }
function todayRu(){ const d = new Date(); return String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear(); }
function dateToRu(v){
  if(!v) return "";
  const s = String(v);
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){ const [y,m,d] = s.split("-"); return `${d}.${m}.${y}`; }
  return s;
}
function normalizeDateInput(input){
  let v = input.value.replace(/[^\d]/g, "").slice(0,8);
  if(v.length >= 5) v = v.slice(0,2)+"."+v.slice(2,4)+"."+v.slice(4);
  else if(v.length >= 3) v = v.slice(0,2)+"."+v.slice(2);
  input.value = v;
}

let data = load();

function load(){
  try {
    const raw = localStorage.getItem(KEY);
    if(!raw) return structuredClone(defaults);
    const parsed = JSON.parse(raw);
    return Object.assign(structuredClone(defaults), parsed);
  } catch(e) {
    return structuredClone(defaults);
  }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(data)); render(); }

function switchToTab(nextTab){
  tab = nextTab;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  render();
}

document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => switchToTab(btn.dataset.tab)));

function render(){
  try {
    if(tab==="home") renderHome();
    if(tab==="service") renderService();
    if(tab==="tasks") renderTasks();
    if(tab==="parts") renderParts();
    if(tab==="fuel") renderFuel();
    if(tab==="errors") renderErrors();
    if(tab==="fluids") renderFluids();
    if(tab==="alts") renderAlternatives();
  } catch(e) {
    byId("screen").innerHTML = `<div class="card"><h2>Ошибка отображения</h2><p>${esc(e.message)}</p><button class="btn red" onclick="localStorage.removeItem(KEY); location.reload()">Сбросить данные и перезапустить</button></div>`;
  }
}

function renderHome(){
  const activeTasks = data.tasks.filter(t => !t.done);
  const totalService = data.service.reduce((s,x)=>s+(Number(x.cost)||0),0);
  const totalFuel = data.fuel.reduce((s,x)=>s+(Number(x.cost)||0),0);
  const nearestOil = data.tasks.find(t => t.title.toLowerCase().includes("масл") && !t.done);
  const oilLeft = nearestOil && nearestOil.dueMileage ? Number(nearestOil.dueMileage) - Number(data.car.mileage) : null;

  byId("screen").innerHTML = `
    <div class="grid">
      <div class="stat"><div class="label">Пробег</div><div class="value">${km(data.car.mileage)}</div></div>
      <div class="stat"><div class="label">Активные задачи</div><div class="value">${activeTasks.length}</div></div>
      <div class="stat"><div class="label">Расходы ТО</div><div class="value">${rub(totalService)}</div></div>
      <div class="stat"><div class="label">Топливо</div><div class="value">${rub(totalFuel)}</div></div>
    </div>

    <div class="card">
      <h2>Карточка авто</h2>
      <p><b>${esc(data.car.brand)} ${esc(data.car.model)}</b>, ${esc(data.car.year)}</p>
      <p>Госномер: <b>${esc(data.car.plate)}</b></p>
      <p>VIN: <b>${esc(data.car.vin)}</b></p>
      <p>Двигатель: <b>${esc(data.car.engine)}</b></p>
      <p>Топливо: <b>${esc(data.car.fuelType)}</b></p>
      <label>Текущий пробег</label>
      <input type="number" id="mileageInput" value="${esc(data.car.mileage)}">
      <button class="btn green" onclick="data.car.mileage=Number(byId('mileageInput').value)||0; save()">Сохранить пробег</button>
    </div>

    ${oilLeft !== null ? `<div class="card"><h2>Контроль масла</h2><p>Следующий контроль: <b>${km(nearestOil.dueMileage)}</b></p><p class="${oilLeft <= 1000 ? "dangerText" : ""}">Осталось: <b>${oilLeft.toLocaleString("ru-RU")} км</b></p></div>` : ""}

    <div class="card">
      <h2>Ближайшие задачи</h2>
      ${activeTasks.slice(0,5).map(t => `<p>• <b>${esc(t.title)}</b><br><span class="muted">${esc(t.dueMileage || t.dueDate || "без срока")}</span></p>`).join("") || `<p class="muted">Активных задач нет.</p>`}
    </div>

    <div class="card">
      <h2>Резервная копия</h2>
      <p class="muted">Сохрани файл с данными автомобиля. Потом его можно импортировать обратно.</p>
      <button class="btn dark" onclick="testAndroidNotification()">Проверить уведомление</button>
      <button class="btn dark" onclick="exportBackup()">Экспорт резервной копии</button>
      <button class="btn green" onclick="byId('backupFile').click()">Импорт резервной копии</button>
      <input id="backupFile" type="file" accept="application/json,.json" class="hidden" onchange="importBackup(event)">
      <button class="btn red" onclick="resetAppData()">Сбросить данные приложения</button>
    </div>
  `;
}

  const petrolCost = petrol.reduce((s,x)=>s+(Number(x.cost)||0),0);
  const gasCost = gas.reduce((s,x)=>s+(Number(x.cost)||0),0);

  byId("screen").innerHTML = `
    <div class="grid">
      <div class="stat"><div class="label">Бензин</div><div class="value">${petrolLiters.toLocaleString("ru-RU")} л</div><div class="muted">${rub(petrolCost)}</div></div>
      <div class="stat"><div class="label">Газ</div><div class="value">${gasLiters.toLocaleString("ru-RU")} л</div><div class="muted">${rub(gasCost)}</div></div>
      <div class="stat"><div class="label">Всего топливо</div><div class="value">${rub(petrolCost + gasCost)}</div></div>
      <div class="stat"><div class="label">Проехал учтено</div><div class="value">${totalKm.toLocaleString("ru-RU")} км</div></div>
    </div>
    <button class="btn green" onclick="addFuelType('Бензин')">+ Заправка бензином</button>
    <button class="btn dark" onclick="addFuelType('Газ')">+ Заправка газом</button>
    ${data.fuel.map((x,i)=>`
      <div class="card">
        <div class="itemTop"><div><h3>${esc(x.type || "Заправка")}</h3>
        <span class="pill">${esc(dateToRu(x.date) || "без даты")}</span>
        <span class="pill">${esc(x.liters || 0)} л</span><span class="pill">${rub(x.cost)}</span></div>
        <button class="smallBtn" onclick="toggleEdit('fuel${i}')">✎</button></div>
        <p><b>Пробег при заправке:</b> ${x.mileage ? km(x.mileage) : "не указан"}</p>
        <p><b>Проехал после прошлой заправки:</b> ${x.kmDriven ? Number(x.kmDriven).toLocaleString("ru-RU") + " км" : "не указано"}</p>
        <p><b>Цена за литр:</b> ${x.liters && x.cost ? rub(Number(x.cost)/Number(x.liters)) : "не указано"}</p>
        <p>${esc(x.note || "")}</p>

function filterErrors(){
  const q = (byId("errorSearch")?.value || "").toLowerCase().trim();
  const list = data.errorCodes.filter(e => !q || e.code.toLowerCase().includes(q) || e.name.toLowerCase().includes(q) || e.causes.toLowerCase().includes(q) || e.fixes.toLowerCase().includes(q));
  byId("errorsList").innerHTML = list.map(e => `<div class="card"><h3>${esc(e.code)} — ${esc(e.name)}</h3><p><b>Возможные причины:</b><br>${esc(e.causes)}</p><p><b>Что делать:</b><br>${esc(e.fixes)}</p></div>`).join("") || `<div class="card"><p class="muted">Ничего не найдено.</p></div>`;
}

  <label>Пробег</label><input type="number" id="${list}_mileage_${i}" value="${esc(x.mileage)}">
  <label>Категория</label><input id="${list}_category_${i}" value="${esc(x.category || "")}">
  <label>Заметка</label><textarea id="${list}_note_${i}">${esc(x.note)}</textarea>
  <label>Стоимость</label><input type="number" id="${list}_cost_${i}" value="${esc(x.cost)}">

}

function fuelInputs(i){
  const x = data.fuel[i];
  return `<label>Тип топлива</label><select id="fuel_type_${i}"><option ${x.type==="Бензин"?"selected":""}>Бензин</option><option ${x.type==="Газ"?"selected":""}>Газ</option></select>

function toggleEdit(id){ byId(id).classList.toggle("hidden"); }
function addService(){ data.service.unshift({id:id(),date:todayRu(),mileage:data.car.mileage,title:"",category:"ТО",note:"",cost:0}); save(); }
function addTask(){ data.tasks.unshift({id:id(),title:"",dueMileage:"",dueDate:"",note:"",done:false}); save(); }
function addPart(){ data.parts.unshift({id:id(),name:"",status:"",source:"",note:""}); save(); }
function addFuelType(type){ data.fuel.unshift({id:id(),type:type,date:todayRu(),mileage:data.car.mileage,liters:"",cost:"",kmDriven:"",note:""}); save(); }

function saveRecord(list,i){
  const x = data[list][i];
  x.title = byId(`${list}_title_${i}`).value;
  x.date = byId(`${list}_date_${i}`).value;
  x.mileage = Number(byId(`${list}_mileage_${i}`).value)||"";
  x.category = byId(`${list}_category_${i}`).value;
  x.note = byId(`${list}_note_${i}`).value;
  x.cost = Number(byId(`${list}_cost_${i}`).value)||0;
  save();
}
function saveTask(i){
  const x = data.tasks[i];
  x.title = byId(`task_title_${i}`).value;
  x.dueMileage = Number(byId(`task_dueMileage_${i}`).value)||"";
  x.dueDate = byId(`task_dueDate_${i}`).value;

  x.mileage = Number(byId(`fuel_mileage_${i}`).value)||"";

function exportBackup(){
  const backup = {
    app: "my_chrysler_300c",
    version: "v10",
    exportedAt: new Date().toLocaleString("ru-RU"),
    data: data
  };

  const text = JSON.stringify(backup, null, 2);
  const blob = new Blob([text], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = "chrysler_300c_backup_" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);
}

function importBackup(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(){
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = parsed.data ? parsed.data : parsed;

      if(!incoming.car || !incoming.service || !incoming.tasks || !incoming.parts){
        alert("Файл не похож на резервную копию приложения Chrysler 300C.");
        return;
      }

      if(!confirm("Импортировать резервную копию? Текущие данные будут заменены.")){
        return;
      }

      data = Object.assign(structuredClone(defaults), incoming);
      localStorage.setItem(KEY, JSON.stringify(data));
      alert("Резервная копия восстановлена.");
      render();

    } catch(e) {
      alert("Не удалось прочитать файл резервной копии.");
    } finally {
      event.target.value = "";
    }
  };

  reader.readAsText(file, "utf-8");
}

function resetAppData(){
  if(confirm("Точно сбросить все данные приложения? Перед сбросом лучше сделать экспорт резервной копии.")){
    localStorage.removeItem(KEY);
    data = structuredClone(defaults);
    render();
  }
}

const tabOrder = ["home","service","tasks","parts","fuel","errors","fluids","alts"];
function enableSwipe(){
  const zone = document.querySelector(".app") || document.body;
  zone.addEventListener("touchstart", e => { const t=e.changedTouches[0]; touchStartX=t.clientX; touchStartY=t.clientY; }, {passive:true});
  zone.addEventListener("touchend", e => {
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
    if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.25) return;
    const idx = tabOrder.indexOf(tab);
    if(dx<0 && idx<tabOrder.length-1) switchToTab(tabOrder[idx+1]);
    if(dx>0 && idx>0) switchToTab(tabOrder[idx-1]);
  }, {passive:true});
}

window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  byId("installBtn").style.display = "block";
});
byId("installBtn").addEventListener("click", async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  byId("installBtn").style.display = "none";
});

if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }

enableSwipe();
render();
</script>
