name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build fake APK
        run: |
          mkdir apk
          echo "My Chrysler 300C APK" > apk/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyChrysler300C-debug-apk
          path: apk/app-debug.apk
